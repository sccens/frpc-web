services:
  frpc-web:
    build: .
    image: frpc-web:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      FRPC_WEB_ADDR: 0.0.0.0:8080
      FRPC_WEB_DATA_DIR: /data
      FRPC_WEB_GITHUB_PROXY: ""
      FRPC_WEB_ACCESS_KEY: ""
      FRPC_WEB_JWT_SECRET: ""
      FRPC_WEB_TRUSTED_PROXY: ""
    volumes:
      - frpc-web-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  frpc-web-data:
